# =============================================================================
# Shared Database Connection Configuration (HikariCP)
# =============================================================================
# SECURITY: Sensitive values below can be overridden by environment variables.
# Environment variables take priority over values set here.
#
#   DB_URL       -> overrides db.url
#   DB_USERNAME  -> overrides db.username
#   DB_PASSWORD  -> overrides db.password
#
# For production, set these env vars in Tomcat's setenv.sh:
#   export DB_PASSWORD="your_secure_password"
#   export DCCMF_ENCRYPTION_KEY="your_32_char_secret_key_here!!"
# =============================================================================

db.url=jdbc:mysql://localhost:3306/dccmf_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.username=root
db.password=#Akshat54321
db.pool.size=10

# =============================================================================
# DCCMF Module Settings
# =============================================================================

# Database catalog used by the dccmf module.
# To use the default database configured in the JDBC connection URL (db.url),
# leave this property blank (e.g., dccmf.db.catalog=) or set it to 'none'.
# If omitted or commented out, the application will not perform any catalog
# switching and will run in the connection's default database.
dccmf.db.catalog=

# =============================================================================
# AES-256-GCM Encryption Key (for lookup token encryption)
# =============================================================================
# SECURITY: Override this with the DCCMF_ENCRYPTION_KEY environment variable.
# The key must be at least 16 characters (padded/truncated to 32 bytes = AES-256).
# Generate a secure key: openssl rand -base64 32
#
# NOTE: Changing this key invalidates all previously encrypted lookup tokens.
# =============================================================================
encryption.secret.key=DCCMFSecretKey12_CHANGE_ME_NOW!!

# =============================================================================
# External HR API settings for dccmf department lookup proxy
# =============================================================================
# WARNING: Do NOT point this at this application's own /api/lookup/departments
# endpoint — that would cause an infinite loop. This must be an EXTERNAL HR API.
external.api.dept.url=http://EXTERNAL-HR-API-HOST/api/departments
external.api.dept.token=Bearer dummy_token_value_12345
external.api.timeout.ms=5000
